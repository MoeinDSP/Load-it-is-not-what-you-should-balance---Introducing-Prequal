# Replicates the paper's multi-tenant testbed (§5):
#
#  ┌──────────────────────────────────────────────────────────────────────────┐
#  │  server1  CPU_LOAD=60  MAX_CONCURRENCY=3  (~35ms, capacity≈85 req/s)    │
#  │  server2  CPU_LOAD=60  MAX_CONCURRENCY=3  (~35ms, capacity≈85 req/s)    │
#  │  server3  CPU_LOAD=0   MAX_CONCURRENCY=20 (~8ms,  capacity≈2500 req/s)  │
#  └──────────────────────────────────────────────────────────────────────────┘
#
#  bgload — sends 20 req/s directly to server1 & server2, representing the
#           antagonist VMs from the paper.  This load appears in server-local
#           RIF (visible to Prequal's probes) but NOT in the LBs' observed
#           latency, so WRR cannot detect it until its own requests fail.
#
#  WRR capacity with bgload using 20/85 ≈ 24% of server1/2, leaving ~65 req/s:
#     3 × 65 = 195 req/s ≈ BASELINE
#  Prequal routes 95% to server3 → capacity ≈ 2500 req/s → no errors in range
#
#  lb-prequal    :8080  — Prequal (HCL + async probing + server-local RIF)
#  lb-weightedrr :8081  — WRR baseline (periodic latency weights, 120s lag)
#
#  Prometheus  :9090
#  Grafana     :3001  (admin/admin)

version: "3.9"

networks:
  prequal-net:
    driver: bridge

# ── Backend servers ───────────────────────────────────────────────────────────
services:
  server1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "80"
      SERVER_ID: "server1"
      CPU_LOAD: "60"         # antagonist-contended: adds ~30ms latency (→ ~35ms total)
      MAX_CONCURRENCY: "3"   # 3/0.035s ≈ 85 req/s capacity
    networks:
      - prequal-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "256m"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  server2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "80"
      SERVER_ID: "server2"
      CPU_LOAD: "60"
      MAX_CONCURRENCY: "3"
    networks:
      - prequal-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "256m"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  server3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "80"
      SERVER_ID: "server3"
      CPU_LOAD: "0"          # clean machine, no antagonists
      MAX_CONCURRENCY: "20"  # 20/0.008s ≈ 2500 req/s — handles both LBs' traffic
    networks:
      - prequal-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "256m"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 5s
      timeout: 3s
      retries: 3

# ── Antagonist background load (simulates other VMs on same physical host) ────
  bgload:
    build:
      context: .
      dockerfile: cmd/bgload/Dockerfile
    environment:
      BG_TARGETS: "server1:80,server2:80"
      BG_RATE: "20"   # 20 req/s per server = 23% of their 85 req/s capacity
    depends_on:
      - server1
      - server2
    networks:
      - prequal-net
    restart: unless-stopped

# ── Load balancers ────────────────────────────────────────────────────────────
  lb-prequal:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      LB_PORT: "8080"
      LB_ALGORITHM: "prequal"
      LB_SERVERS: "server1=server1:80,server2=server2:80,server3=server3:80"
      LB_QRIF: "0.84"
      LB_PROBE_RATE: "2"
    ports:
      - "8080:8080"
    depends_on:
      - server1
      - server2
      - server3
    networks:
      - prequal-net
    restart: unless-stopped

  lb-weightedrr:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      LB_PORT: "8080"
      LB_ALGORITHM: "weightedrr"
      LB_SERVERS: "server1=server1:80,server2=server2:80,server3=server3:80"
      LB_WEIGHT_INTERVAL: "3600s" # never refreshes during the ~10 min experiment — mirrors paper's stale trailing signal
    ports:
      - "8081:8080"
    depends_on:
      - server1
      - server2
      - server3
    networks:
      - prequal-net
    restart: unless-stopped

# ── Monitoring ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - prequal-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/loadbalancer.json"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - prequal-net
